<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Laboratório Geométrico 3D Avançado</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen flex flex-col">

    <header class="bg-slate-800 p-4 shadow-md text-center border-b border-emerald-900">
        <h1 class="text-xl md:text-3xl font-bold tracking-wide text-emerald-400">Laboratório Geométrico 3D</h1>
        <p class="text-slate-400 text-xs md:text-sm">Explore formas, segmentos e fórmulas</p>
    </header>

    <main class="flex-1 flex flex-col lg:flex-row p-4 gap-4 max-w-[1920px] mx-auto w-full box-border">
        
        <aside class="w-full lg:w-96 flex flex-col gap-4">
            
            <section class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700">
                <h2 class="text-lg font-semibold border-b border-slate-700 pb-2 mb-4 text-slate-300">
                    Configurações
                </h2>
                
                <div class="flex flex-col gap-4">
                    <div class="flex flex-col gap-1.5">
                        <label for="shape-select" class="text-xs font-medium text-slate-400">Tipo de Forma:</label>
                        <select id="shape-select" class="bg-slate-700 border border-slate-600 rounded-lg p-2.5 text-white text-sm focus:ring-2 focus:ring-emerald-500 focus:outline-none cursor-pointer">
                            <option value="cube">Cubo / Paralelepípedo</option>
                            <option value="sphere">Esfera</option>
                            <option value="cylinder">Cilindro</option>
                            <option value="cone">Cone</option>
                            <option value="pyramid">Pirâmide Quadrangular</option>
                        </select>
                    </div>

                    <div id="controls-container" class="flex flex-col gap-4 pt-2 border-t border-slate-700/50"></div>
                </div>
            </section>

            <section class="bg-slate-800 p-5 rounded-xl shadow-lg border border-slate-700 lg:flex-1">
                <h2 class="text-lg font-semibold border-b border-slate-700 pb-2 mb-4 text-slate-300">
                    Fórmulas Principais
                </h2>
                <div id="formula-container" class="text-sm space-y-4 text-slate-300"></div>
            </section>
        </aside>

        <section class="flex-1 bg-slate-950 rounded-xl shadow-inner relative min-h-[450px] lg:min-h-0 overflow-hidden border border-slate-800 flex flex-col" id="canvas-container">
            
            <div class="absolute top-3 right-3 flex gap-2 z-10">
                <div class="flex items-center gap-1.5 bg-slate-900/80 px-3 py-1 rounded-full text-xs backdrop-blur-sm">
                    <div class="w-3 h-3 rounded-full bg-emerald-500 border border-white/20"></div> Lados
                </div>
                <div class="flex items-center gap-1.5 bg-slate-900/80 px-3 py-1 rounded-full text-xs backdrop-blur-sm">
                    <div class="w-3 h-3 rounded-full bg-sky-500 border border-white/20"></div> Base(s)
                </div>
            </div>

            <div class="absolute bottom-3 left-3 bg-slate-900/70 px-3 py-1.5 rounded-md text-xs text-slate-400 pointer-events-none backdrop-blur-sm z-10 border border-slate-700">
                Arraste com o mouse para rodar o objeto
            </div>
        </section>

    </main>

    <script src="main.js"></script>
</body>
</html>
